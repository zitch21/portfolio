[build]
  publish = "."
  command = "node build-env.js"

[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "env-config.js"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' https://*.supabase.co https://api.emailjs.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-ancestors 'none';"